# ==================== KONFIGURACJA BADANIA ====================
[EKSPERYMENT]
nazwa = badanie
opis = Pelne badanie eksperymentalne

[WYSWIETLANIE]
fullscreen = True
screen_width = 1920
screen_height = 1080

[WERSJA]
# Wersja A: klawisz A = trojkat, klawisz L = romb
# Wersja B: klawisz L = trojkat, klawisz A = romb
wersja = A

[IKONA]
icon_in_center = True
icon_size = 0.1

[KSZTALTY]
use_colors = False
unique_shapes = True
target_size = 0.08
distractor_size = 0.08
fixation_size = 0.008
radius = 0.38

[CZASY]
fixation_time = 0.5
stimulus_time = 0.1
max_response_time = 2.0
feedback_time = 0.5

[PROBY]
n_training_trials = 32
n_experimental_trials = 320
n_blocks = 4

[FEEDBACK]
show_feedback = True

[APLIKACJE]
social_apps = tiktok.png, messenger.png, instagram.png
neutral_apps = clock.png, calculator.png, notepad.png
